<!-- Pattern: tier-cards | Best vibe: Bold, Corporate | WeasyPrint: tested -->
<!-- 3 pricing tier cards side by side. Middle card "featured" with accent border and badge.
     Based on the Carhartt bid's Program Tiers section.
     page-break-inside: avoid on the entire grid keeps all tiers on one page. -->

<style>
  * {
    box-sizing: border-box;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }

  .tier-grid {
    display: flex;
    gap: 12pt;
    margin: 16pt 0;
    page-break-inside: avoid;
  }

  .tier-card {
    flex: 1;
    border: 1pt solid var(--neutral-border, #D4C5B0);
    padding: 14pt 16pt;
    background: var(--surface, #FDFAF5);
    page-break-inside: avoid;
  }

  /* Featured card: thicker primary border, white background */
  .tier-card--featured {
    border: 2pt solid var(--primary, #B77729);
    background: white;
  }

  .tier-card__badge {
    display: inline-block;
    background: var(--accent, #F5A600);
    color: var(--dark, #1A1A1A);
    font-size: 6.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5pt;
    padding: 2pt 8pt;
    margin-bottom: 6pt;
  }

  .tier-card__name {
    font-size: 9pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8pt;
    color: var(--neutral-mid, #5C5C5C);
    margin-bottom: 4pt;
  }

  .tier-card--featured .tier-card__name {
    color: var(--primary, #B77729);
  }

  .tier-card__amount {
    font-size: 22pt;
    font-weight: 800;
    color: var(--dark, #1A1A1A);
    margin-bottom: 6pt;
    line-height: 1;
  }

  .tier-card__desc {
    font-size: 8pt;
    color: var(--neutral-mid, #5C5C5C);
    line-height: 1.4;
  }

  /* Optional: feature list inside tier card */
  .tier-card__features {
    margin: 8pt 0 0 0;
    padding: 0;
    list-style: none;
    font-size: 8pt;
    color: var(--neutral-mid, #5C5C5C);
  }

  .tier-card__features li {
    padding: 3pt 0;
    border-bottom: 0.5pt solid var(--neutral-border, #D4C5B0);
  }

  .tier-card__features li:last-child {
    border-bottom: none;
  }
</style>

<div class="tier-grid">
  <div class="tier-card">
    <div class="tier-card__name">Starter</div>
    <div class="tier-card__amount">$3,200</div>
    <div class="tier-card__desc">Essential items only. Best for small teams or trial runs.</div>
  </div>

  <div class="tier-card tier-card--featured">
    <div class="tier-card__badge">Recommended</div>
    <div class="tier-card__name">Standard</div>
    <div class="tier-card__amount">$6,850</div>
    <div class="tier-card__desc">Full product lineup with embroidery. Our most popular package.</div>
  </div>

  <div class="tier-card">
    <div class="tier-card__name">Premium</div>
    <div class="tier-card__amount">$12,500</div>
    <div class="tier-card__desc">Everything in Standard plus premium outerwear and accessories.</div>
  </div>
</div>
