name: proposal-package
description: >-
  Multi-document consulting or sales proposal package with cover letter,
  detailed proposal (scope, approach, deliverables, pricing, terms),
  and signature/acceptance page. Approximately 10 pages total.
version: "1.0"
documents:
  - name: 01_Cover_Letter
    template: templates/01_cover_letter.html
    expected_pages: 1
  - name: 02_Proposal
    template: templates/02_proposal.html
    expected_pages: 7
  - name: 03_Signature
    template: templates/03_signature.html
    expected_pages: 2
default_tier: desktop
