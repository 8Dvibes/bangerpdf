name: Default Bid Package Brand
description: >-
  Navy and blue professional palette with Inter font family.
  Suitable for construction, trade, and professional services bids.

colors:
  primary: "#0D1B2A"
  secondary: "#2B5EA7"
  accent: "#3B7DD8"
  neutral-dark: "#1f2937"
  neutral-mid: "#64748b"
  neutral-light: "#f1f5f9"
  neutral-border: "#e2e8f0"
  neutral-border-dark: "#cbd5e1"
  surface: "#f8fafc"
  warning-bg: "#fef3c7"
  warning-text: "#92400e"
  warning-border: "#d97706"

typography:
  font_family: "'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
  font_size_base: "10pt"
  line_height: 1.45

page:
  size: Letter
  margin: "0.6in 0.7in 0.7in 0.7in"
