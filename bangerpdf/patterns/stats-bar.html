<!-- Pattern: stats-bar | Best vibe: Bold, Corporate | WeasyPrint: tested -->
<!-- Horizontal bar with 3-5 key metrics. Large number + small label per stat.
     Works as a section divider or hero accent. Dark background with accent numbers.
     page-break-inside: avoid keeps stats together. -->

<style>
  * {
    box-sizing: border-box;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }

  .stats-bar {
    background: var(--dark, #1A1A1A);
    display: flex;
    gap: 18pt;
    padding: 24pt 36pt;
    margin: 20pt 0;
    page-break-inside: avoid;
  }

  .stats-bar--light {
    background: var(--surface, #FDFAF5);
    border: 1pt solid var(--neutral-border, #D4C5B0);
  }

  .stat {
    flex: 1;
    text-align: center;
  }

  .stat__number {
    font-size: 28pt;
    font-weight: 800;
    color: var(--accent, #F5A600);
    line-height: 1;
  }

  .stat__label {
    font-size: 7pt;
    text-transform: uppercase;
    letter-spacing: 1.2pt;
    color: rgba(255,255,255,0.7);
    margin-top: 4pt;
  }

  /* Light variant label color */
  .stats-bar--light .stat__number {
    color: var(--primary, #B77729);
  }

  .stats-bar--light .stat__label {
    color: var(--neutral-mid, #5C5C5C);
  }
</style>

<!-- Dark variant (best on content pages as a divider) -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat__number">250</div>
    <div class="stat__label">Total Pieces</div>
  </div>
  <div class="stat">
    <div class="stat__number">5</div>
    <div class="stat__label">Products</div>
  </div>
  <div class="stat">
    <div class="stat__number">30</div>
    <div class="stat__label">Day Turnaround</div>
  </div>
  <div class="stat">
    <div class="stat__number">$6,850</div>
    <div class="stat__label">Program Total</div>
  </div>
</div>
