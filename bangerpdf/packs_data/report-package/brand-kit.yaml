name: Academic Report
description: >-
  Academic/research report palette with deep blue-gray primary and
  medium blue accent. Designed for long-form reports with hierarchical
  section structure.

colors:
  primary: "#2D3748"
  secondary: "#4299E1"
  accent: "#4299E1"
  neutral-dark: "#1a202c"
  neutral-mid: "#718096"
  neutral-light: "#f7fafc"
  neutral-border: "#e2e8f0"
  neutral-border-dark: "#cbd5e1"
  surface: "#f7fafc"

typography:
  font_family: "'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
  font_size_base: "10pt"
  line_height: 1.55

page:
  size: Letter
  margin: "0.75in 0.85in 0.85in 0.85in"
